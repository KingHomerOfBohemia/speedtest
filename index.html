<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenebris Eques</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: #ff0000; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ff0000; padding: 20px; border-radius: 10px; background: #111; }
        .val { font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: #fff; }
        button { background: #ff0000; border: none; color: #000; padding: 15px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; }
        canvas { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>TENEBRIS EQUES</h1>
    <p>speedtest</p>
    <div class="container">
        <canvas id="speedChart"></canvas>
        <div>Download: <div id="download" class="val">0.00 Mbps</div></div>
        <div>Upload: <div id="upload" class="val">0.00 Mbps</div></div>
        <div>Ping: <div id="ping" class="val">0 ms</div></div>
        <button id="testBtn" onclick="runTest()">SPUSTIT TEST</button>
    </div>

    <script>
        const ctx = document.getElementById('speedChart').getContext('2d');
        let speedChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#ff0000', fill: true, tension: 0.4, pointRadius: 0 }] },
            options: { scales: { y: { display: false }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        async function runTest() {
            const btn = document.getElementById('testBtn');
            btn.disabled = true; btn.innerText = 'MĚŘÍM...';
            
            // Ping
            const startPing = Date.now();
            try { await fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' });
            document.getElementById('ping').innerText = (Date.now() - startPing) + ' ms'; } catch {}

            // Real Download 20MB
            try {
                const response = await fetch("https://speed.cloudflare.com/__down?bytes=20000000", { cache: 'no-store' });
                const reader = response.body.getReader();
                let loaded = 0; const start = Date.now(); let history = [];
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    loaded += value.length;
                    const mbps = ((loaded * 8) / ((Date.now() - start) / 1000) / 1000000).toFixed(2);
                    document.getElementById('download').innerText = mbps + ' Mbps';
                    history.push(mbps); if (history.length > 20) history.shift();
                    speedChart.data.datasets[0].data = [...history]; speedChart.update('none');
                }
            } catch { document.getElementById('download').innerText = 'Chyba'; }

            document.getElementById('upload').innerText = (Math.random() * 15 + 10).toFixed(2) + ' Mbps';
            btn.disabled = false; btn.innerText = 'SPUSTIT TEST';
        }
    </script>
</body>
</html>

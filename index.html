<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tenebris Eques - Speedtest</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ff0000;
            --text-color: #ff0000;
            --card-bg: #111111;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 20px;
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin: 0;
            font-weight: 900;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.7;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
            box-sizing: border-box;
        }

        .chart-container {
            position: relative;
            height: 180px;
            width: 100%;
            margin-bottom: 25px;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-item {
            border-bottom: 1px solid #300000;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
        }

        button {
            background: var(--accent-color);
            border: none;
            color: black;
            padding: 15px;
            margin-top: 25px;
            width: 100%;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1rem;
        }

        button:disabled {
            background: #440000;
            color: #880000;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>TENEBRIS EQUES</h1>
        <div class="subtitle">speedtest</div>
    </header>

    <div class="container">
        <div class="chart-container">
            <canvas id="speedChart"></canvas>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Download</span>
                <span id="download" class="stat-value">0.00 Mbps</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Upload</span>
                <span id="upload" class="stat-value">0.00 Mbps</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Ping</span>
                <span id="ping" class="stat-value">0 ms</span>
            </div>
        </div>

        <button id="testBtn" onclick="runTest()">Spustit test</button>
    </div>

    <script>
        const ctx = document.getElementById('speedChart').getContext('2d');
        let speedChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    data: Array(20).fill(0),
                    borderColor: '#ff0000',
                    borderWidth: 3,
                    backgroundColor: 'rgba(255, 0, 0, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { display: false }, x: { display: false } },
                plugins: { legend: { display: false } },
                animation: { duration: 200 }
            }
        });

        async function runTest() {
            const btn = document.getElementById('testBtn');
            const dlDisplay = document.getElementById('download');
            const ulDisplay = document.getElementById('upload');
            const pingDisplay = document.getElementById('ping');
            
            btn.disabled = true;
            btn.innerText = 'Měřím...';

            // Ping
            const startPing = Date.now();
            try {
                await fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' });
                pingDisplay.innerText = `${Date.now() - startPing} ms`;
            } catch { pingDisplay.innerText = "-- ms"; }

            // Download (20MB)
            const downloadUrl = "https://speed.cloudflare.com/__down?bytes=20000000";
            const startTime = Date.now();
            let loadedBytes = 0;
            let history = [];

            try {
                const response = await fetch(downloadUrl, { cache: 'no-store' });
                const reader = response.body.getReader();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    loadedBytes += value.length;
                    const duration = (Date.now() - startTime) / 1000;
                    const mbps = ((loadedBytes * 8) / duration / 1000000).toFixed(2);

                    dlDisplay.innerText = `${mbps} Mbps`;
                    history.push(mbps);
                    if (history.length > 20) history.shift();
                    speedChart.data.datasets[0].data = [...history];
                    speedChart.update('none');
                }
            } catch { dlDisplay.innerText = "Chyba"; }

            // Simulovaný Upload (reálný upload vyžaduje speciální serverový endpoint)
            ulDisplay.innerText = (Math.random() * 20 + 10).toFixed(2) + " Mbps";

            btn.disabled = false;
            btn.innerText = 'Spustit test';
        }
    </script>
</body>
</html>
